# 全局池
custom_proxy_group=龙珠`select`!!GROUP=longzhu
custom_proxy_group=量子`select`!!GROUP=quanx
custom_proxy_group=宝可梦专线`select`!!GROUP=pokemon!!(?=.*专线)
custom_proxy_group=宝可梦普通`select`!!GROUP=pokemon!!(?!.*专线)


custom_proxy_group=🛑 广告拦截`select`[]DIRECT`[]REJECT
custom_proxy_group=🎯 全球直连`select`[]DIRECT
custom_proxy_group=🐟 漏网之鱼`select`[]DIRECT`[]干净节点选择`[]普通节点选择`[]开放节点选择

enable_rule_generator=true
overwrite_original_rules=true
