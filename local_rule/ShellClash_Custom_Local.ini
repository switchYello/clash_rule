# 总控池
custom_proxy_group=干净节点选择`select`[]香港节点`[]日本节点`[]自由选择
custom_proxy_group=普通节点选择`select`[]香港节点`[]日本节点`[]龙珠测速`[]宝可梦专线测速`[]宝可梦普通测速`[]自由选择
custom_proxy_group=开放节点选择`select`[]香港节点`[]日本节点`[]龙珠测速`[]宝可梦专线测速`[]宝可梦普通测速`[]自由选择`[]普通节点选择

# 节点指定
custom_proxy_group=香港节点`select`[]量子香港节点`[]龙珠香港节点`[]宝可梦专线香港节点`[]宝可梦普通香港节点
